<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Sahabat Gamersku</title>
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), url('foto kenangan.png');
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 3px solid #FFD700;
            border-radius: 20px;
            /* Kotak hitam transparan agar tulisan jelas */
            background: rgba(0, 0, 0, 0.6); 
            max-width: 500px;
            box-shadow: 0 0 30px rgba(215, 175, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #FFD700;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .highlight {
            color: #FFD700;
            font-weight: bold;
        }

        .btn-game {
            display: inline-block;
            margin-top: 20px;
            background-color: #FFD700;
            color: #111;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid #b39700;
            transition: all 0.3s ease;
        }

        .btn-game:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #FFD700;
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hay Teman Online Ku !!</h1>
        <p>Dari Dunia <span class="highlight">Roblox</span> ke Persahabatan Nyata.</p>
        <p>Makasih ya sudah mau kenalan dengan aku. Tombol di bawah ini mungkin kenangan yang tidak bisa ku lupain</p>
        <a href="#" class="btn-game">Terimakasih Kenangan nya</a>
    </div>
</body>
</html>
