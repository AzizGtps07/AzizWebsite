<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Sahabat Gamersku</title>
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), url('foto kenangan.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 3px solid #FFD700;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6); 
            max-width: 500px;
            box-shadow: 0 0 30px rgba(215, 175, 0, 0.3);
            position: relative;
            z-index: 2;
        }

        h1 {
            color: #FFD700;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 2.5s steps(30, end) forwards;
        }

        @keyframes typing { from { width: 0; } to { width: 100%; } }

        .p-fade { opacity: 0; animation: fadeIn 2s 3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .highlight { color: #FFD700; font-weight: bold; }

        .btn-game {
            display: inline-block;
            margin-top: 20px;
            background-color: #FFD700;
            color: #111;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid #b39700;
            transition: all 0.3s ease;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 2s 5s forwards;
        }

        .btn-game:hover { transform: scale(1.1); box-shadow: 0 0 20px #FFD700; background-color: #ffffff; }

        /* Tombol Musik Lebih Mencolok */
        #musicBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #FFD700;
            color: #111;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            z-index: 100;
            transition: 0.3s;
        }

        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <h1>Hay Teman Online Ku !!</h1>
        <div class="p-fade">
            <p>Dari Dunia <span class="highlight">Roblox</span> ke Persahabatan Nyata.</p>
            <p>Makasih ya sudah mau kenalan dengan aku. Tombol di bawah ini merupakan kenangan yang tidak bisa ku lupain</p>
        </div>
        <a href="#" class="btn-game">Terimakasih Kenangan nya</a>
    </div>

    <button id="musicBtn">🔇</button>

    <audio id="bgMusic" loop preload="auto">
        <source src="lagu.mp3" type="audio/mp3">
    </audio>

    <script>
        const music = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicBtn");
        let isPlaying = false;

        // Fungsi nyalakan/matikan musik
        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicBtn.textContent = "🔇";
                musicBtn.style.backgroundColor = "#FFD700";
            } else {
                // Paksa play dengan volume maksimal
                music.volume = 1.0;
                music.play().then(() => {
                    musicBtn.textContent = "🔊";
                    musicBtn.style.backgroundColor = "#fff";
                }).catch(e => console.log("Gagal putar: ", e));
            }
            isPlaying = !isPlaying;
        }

        musicBtn.addEventListener("click", toggleMusic);

        // Efek Salju
        const canvas = document.getElementById("snow-canvas");
        const ctx = canvas.getContext("2d");
        let particles = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) { this.y = -10; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function createParticles() { for (let i = 0; i < 70; i++) { particles.push(new Particle()); } }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = []; createParticles();
        });

        createParticles();
        animateParticles();
    </script>
</body>
</html>
